name: CI + Physics Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Build physics tests
        run: npx tsc -p tsconfig.physics-tests.json

      - name: Mark dist as CommonJS for runner
        run: |
          mkdir -p dist
          echo '{"type":"commonjs"}' > dist/package.json

      - name: Run physics tests
        run: node dist/tests/physicsTests.js

      - name: Upload physics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physics-report
          path: |
            physics-test-report.json
            physics-test-log.txt
